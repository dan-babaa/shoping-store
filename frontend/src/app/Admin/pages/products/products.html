<div class="products-page">

  <!-- Header -->
  <div class="header">
    <h2>Products</h2>
    <button class="add-btn">+ Add Product</button>
  </div>

  <!-- Search & Filter -->
  <div class="controls">
    <input type="text" placeholder="Search product..." (input)="onSearch($any($event.target).value)"/>
    
    <select title="filter" (change)="onFilterChange($any($event.target).value)">
      <option value="">All</option>
      <option value="inStock">In Stock</option>
      <option value="outStock">Out of Stock</option>
      <option value="lowStock">Low Stock</option>
    </select>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <table>

      <thead>
        <tr>
          <th>Product</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Rating</th>
          <th>Collection</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let product of visibleProducts">

          <td class="product-cell">
            <img [src]="product.imageUrl[0]" alt="image"/>
            <div>
              <strong>{{ product.name }}</strong> --
              <small>{{ product.brand }}</small>
            </div>
          </td>

          <td>
            ${{ product.price }}
            <span *ngIf="product.discount" class="discount">
              -{{ product.discount }}%
            </span>
          </td>

          <td>
            <span 
              [class.low]="product.quantity < 5"
              [class.out]="product.quantity <= 0">
              {{ product.quantity }}
            </span>
          </td>

          <td>⭐ {{ product.rating }}</td>

          <td>
            <span class="collection" *ngIf="product.collectionType">
              {{ product.collectionType }}
            </span>
          </td>

          <td>
            <span 
              class="status"
              [class.active]="product.quantity > 0"
              [class.disabled]="product.quantity <= 0">
              {{ product.quantity >1 ? 'Active' : 'Disabled' }}
            </span>
          </td>

          <td class="actions">
            <button class="edit">Edit</button>
            <button 
  class="disable"
  (click)="toggleStock(product)">
  
  {{ product.quantity <= 0 ? 'Restock' : 'Mark Out' }}

</button>
            <button class="delete">Delete</button>
          </td>

        </tr>
      </tbody>

      <div class="load-more-container" *ngIf="hasMore()">
  <button class="load-more-btn" (click)="loadMore()">
    Load More
  </button>
</div>
    </table>
  </div>

</div>
